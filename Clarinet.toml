[project]
name = 'chess-protocol'
description = 'Chessify Protocol - Standalone Clarity Version'
authors = ['Jadonamite']
telemetry = true
cache_dir = './.cache'
requirements = []


[contracts.playchessifyToken]
path = 'contracts/playchessifyToken.clar'
clarity_version = 2
epoch = 'latest'

[contracts.playchessifyEngine]
path = 'contracts/playchessifyEngine.clar'
clarity_version = 2
epoch = 'latest'

[repl.analysis]
passes = [
    'call_checker',
]

[repl.remote_data]
enabled = false
api_url = 'https://api.hiro.so'
